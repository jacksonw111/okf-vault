name: OKF Pipeline

# 唯一触发器：每天定时 + 手动。定时触发 => agent 自己的 push 不会再触发本工作流，
# 死循环从结构上就不可能发生（GITHUB_TOKEN 推送也不会触发 schedule）。
on:
  schedule:
    # 每天 UTC 19:00（= 北京时间次日 03:00）。GitHub cron 可能延迟数分钟到数十分钟。
    - cron: "0 19 * * *"
  # 手动触发：首次验证、临时整理都走这里（Actions 页 → Run workflow）。
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: okf-pipeline
  cancel-in-progress: false

jobs:
  process:
    name: Agent 整理 inbox
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: 检查 GLM_API_KEY 是否已配置
        id: keycheck
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
        run: |
          if [ -z "$GLM_API_KEY" ]; then
            echo "::warning::未配置 GLM_API_KEY secret，跳过 agent 处理。请在仓库 Settings → Secrets and variables → Actions → New repository secret 添加 GLM_API_KEY。"
            echo "has_key=false" >> $GITHUB_OUTPUT
          else
            echo "GLM_API_KEY 已配置。"
            echo "has_key=true" >> $GITHUB_OUTPUT
          fi

      - name: 运行 Claude Code 处理 inbox（主：GLM-5.2，备：MiniMax）
        if: steps.keycheck.outputs.has_key == 'true'
        working-directory: content
        # 主备双端点，同一套 prompt。主端 GLM 失败（含 529 过载）则自动切 MiniMax 重跑一次。
        # 不无限重试，不浪费 Action 时长；MiniMax 也失败才整体失败。
        run: |
          PROMPT="$(cat ../.claude/prompt.txt)"
          set +e
          echo "::notice::尝试主端点 GLM-5.2"
          ANTHROPIC_BASE_URL=https://open.bigmodel.cn/api/anthropic \
          ANTHROPIC_AUTH_TOKEN="${{ secrets.GLM_API_KEY }}" \
          ANTHROPIC_MODEL=glm-5.2 \
          ANTHROPIC_DEFAULT_SONNET_MODEL=glm-5.2 \
          ANTHROPIC_DEFAULT_HAIKU_MODEL=glm-5.2 \
          ANTHROPIC_DEFAULT_OPUS_MODEL=glm-5.2 \
          claude -p "$PROMPT" --permission-mode auto --output-format text
          rc=$?
          set -e
          if [ $rc -eq 0 ]; then
            echo "::notice::GLM-5.2 成功"
            exit 0
          fi
          if [ -z "${{ secrets.MINIMAX_API_KEY }}" ]; then
            echo "::error::GLM 失败（退出码 $rc）且未配置 MINIMAX_API_KEY，无备端点"
            exit $rc
          fi
          echo "::warning::GLM 失败（退出码 $rc，常见 529 过载），切换备端点 MiniMax-M2.7"
          ANTHROPIC_BASE_URL=https://api.minimax.io/anthropic \
          ANTHROPIC_AUTH_TOKEN="${{ secrets.MINIMAX_API_KEY }}" \
          ANTHROPIC_MODEL=minimax-m2.7 \
          ANTHROPIC_DEFAULT_SONNET_MODEL=minimax-m2.7 \
          ANTHROPIC_DEFAULT_HAIKU_MODEL=minimax-m2.7 \
          ANTHROPIC_DEFAULT_OPUS_MODEL=minimax-m2.7 \
          claude -p "$PROMPT" --permission-mode auto --output-format text


      - name: 提交并推送整理结果到 main
        if: steps.keycheck.outputs.has_key == 'true'
        run: |
          git config user.name  "okf-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content
          if git diff --cached --quiet; then
            echo "inbox 无需处理：没有产生改动。"
          else
            git commit -m "chore(okf): daily auto-process inbox [skip ci]"
            git push
          fi

  publish:
    name: 构建并发布 Quartz 站点到 Pages
    needs: process
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 构建 Quartz
        run: npx quartz build

      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 上传站点产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
